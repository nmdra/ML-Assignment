name: Python Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./App
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: App/.python-version

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: App/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(uv run python -c "import importlib.metadata; print(importlib.metadata.version('your-package-name'))")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
          echo "Version mismatch: package=$PKG_VERSION tag=$TAG_VERSION"
          exit 1
          fi

      - name: Build release
        run: uv build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: App/dist/
          retention-days: 7

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: App/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
